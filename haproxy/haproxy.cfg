global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 10000
    timeout client  300000
    timeout server  300000
    timeout http-request 30000
    timeout http-keep-alive 15000

# Stats Page
listen stats
    bind *:8404
    stats enable
    stats uri /monitor
    stats refresh 5s
    stats auth admin:admin123

# HTTP Frontend
# The datacenter LB (10.1.2.62) terminates SSL and forwards plain HTTP here.
# Detect by source IP, inject the correct headers, and pass to backend.
# Plain HTTP from any other source is redirected to HTTPS.
frontend http-in
    bind *:80
    acl from_lb src 10.1.2.62
    acl is_forwarded_https hdr(X-Forwarded-Proto) https
    http-request set-header X-Forwarded-Proto https if from_lb or is_forwarded_https
    http-request set-header X-Forwarded-Port 443    if from_lb or is_forwarded_https
    http-request redirect scheme https code 301 unless from_lb or is_forwarded_https
    default_backend app_nodes

# HTTPS Frontend
frontend https-in
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/130_nhmp_gov_pk.pem
    # Tell the backend the original request was HTTPS (fixes mixed content)
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 443
    http-response set-header Strict-Transport-Security max-age=31536000
    default_backend app_nodes

# Backend App Nodes
backend app_nodes
    balance roundrobin
    option httpchk
    http-check send meth GET uri /up ver HTTP/1.1 hdr Host localhost
    http-check expect status 200-399
    cookie SERVERID insert indirect nocache
    server web-1 web-1:80 check cookie web1
    server web-2 web-2:80 check cookie web2

# Optional: Database Read-Write Splitting (Advanced)
