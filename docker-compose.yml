services:
  haproxy:
    image: haproxy:alpine
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404" # Stats page
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/certs:/usr/local/etc/haproxy/certs:ro
    depends_on:
      - web-1
      - web-2
    networks:
      - crm-net

  web-1:
    image: nginx:alpine
    volumes:
      - ./public:/var/www/html/public
      - ./nginx-1.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-1
    networks:
      - crm-net

  web-2:
    image: nginx:alpine
    volumes:
      - ./public:/var/www/html/public
      - ./nginx-2.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-2
    networks:
      - crm-net

  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: &app-env
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY:-base64:$(openssl rand -base64 32)}
      - APP_URL=${APP_URL:-https://130.nhmp.gov.pk}
      - FORCE_HTTPS=${FORCE_HTTPS:-true}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-*}      # LOCAL DATABASE
      - DB_CONNECTION=mysql
      - DB_HOST=db-1
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-130_crm_db}
      - DB_USERNAME=${DB_USERNAME:-crm_user}
      - DB_PASSWORD=${DB_PASSWORD:-crm_password}
      
      # LOCAL REDIS
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      
      # LOCAL STORAGE
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_BUCKET=crm-storage
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
    networks:
      crm-net:
        aliases:
          - app-node

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: *app-env
    networks:
      crm-net:
        aliases:
          - app-node

  db-1:
    image: mysql:8.4
    command: ["mysqld", "--server-id=1", "--binlog-checksum=NONE", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--log-bin=mysql-bin", "--log-replica-updates=ON", "--binlog-format=ROW"]
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-130_crm_db}
      - MYSQL_USER=${DB_USERNAME:-crm_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-crm_password}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-secret}
    ports:
      - "3309:3306"
      - "0.0.0.0:3306:3306"
    volumes:
      - dbdata-1:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_ROOT_PASSWORD:-secret}"]
    networks:
      - crm-net

  db-2:
    image: mysql:8.4
    command: ["mysqld", "--server-id=2", "--binlog-checksum=NONE", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--log-bin=mysql-bin", "--log-replica-updates=ON", "--binlog-format=ROW"]
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-130_crm_db}
      - MYSQL_USER=${DB_USERNAME:-crm_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-crm_password}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-secret}
    ports:
      - "3310:3306"
    volumes:
      - dbdata-2:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - crm-net

  db-3:
    image: mysql:8.4
    command: ["mysqld", "--server-id=3", "--binlog-checksum=NONE", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--log-bin=mysql-bin", "--log-replica-updates=ON", "--binlog-format=ROW"]
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-130_crm_db}
      - MYSQL_USER=${DB_USERNAME:-crm_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-crm_password}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-secret}
    ports:
      - "3311:3306"
    volumes:
      - dbdata-3:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - crm-net

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - crm-net

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password}
    ports:
      - "0.0.0.0:9000:9000"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - crm-net

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/crm-storage;
      /usr/bin/mc anonymous set public myminio/crm-storage;
      exit 0;
      "
    networks:
      - crm-net

  # --- Monitoring Stack (Phase 5) ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - crm-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - crm-net

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - crm-net

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    environment:
      - DATA_SOURCE_NAME=root:secret@(db-1:3306)/
    networks:
      - crm-net

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis:6379
    networks:
      - crm-net

networks:
  crm-net:
    driver: bridge

volumes:
  dbdata-1:
  dbdata-2:
  dbdata-3:
  redisdata:
  miniodata:
  prometheusdata:
  grafanadata:
